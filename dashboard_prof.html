<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الأستاذ(ة) - جمعية مواهب المنان - دار القرآن والحديث</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth.js"></script>
</head>
<body class="bg-gray-50 font-['Cairo'] p-4 md:p-8">
    <div class="flex justify-center mb-4 mt-2">
    <img src="logo.webp" alt="مواهب المنان" class="h-24 object-contain drop-shadow-md">
</div>

    <header class="bg-white p-6 rounded-2xl shadow-sm flex justify-between items-center mb-8">
        <div>
            <h1 class="text-2xl font-black text-emerald-800">مرحباً أستاذ(ة) <span id="prof-name">جاري التحميل...</span></h1>
            <p class="text-gray-500">القسم: <span id="prof-classe" class="font-bold">جاري التحميل...</span></p>
        </div>
<button onclick="deconnexion()" class="bg-rose-100 text-rose-600 px-4 py-2 rounded-xl font-bold hover:bg-rose-200 transition"> الخروج</button> </header>

    <div class="bg-white p-6 rounded-2xl shadow-sm">
        <h2 class="text-xl font-bold text-gray-800 mb-6">📚 تلاميذي </h2>
        <div id="students-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            <p class="text-gray-500">جاري التحميل...</p>
        </div>
    </div>

    <script>
async function initProfDashboard() {
            const session = Auth.getSession();
            if (!session || session.role !== 'prof') return window.location.href = 'login.html';
            document.getElementById('prof-name').innerText = session.prenom;
            document.getElementById('prof-classe').innerText = session.nom; // 'nom' stocke la classe

            // 🔧 CORRECTION : Ajoute 'await'
            const profs = await Auth.getProfs();
            const users = await Auth.getAllUsers();
            const myData = profs[session.username];

            chargerSuiviDevoirs(); 
            setInterval(chargerSuiviDevoirs, 10000); // 10 secondes c'est plus safe pour une DB en ligne

            const grid = document.getElementById('students-grid');
            if (!myData || !myData.students || myData.students.length === 0) {
                grid.innerHTML = '<p class="text-gray-500 col-span-full">لا يوجد تلاميذ مرتبطين بحسابك حالياً.</p>'; return;
            }

            grid.innerHTML = '';
            myData.students.forEach(studentId => {
                const s = users[studentId]; if (!s) return;
                grid.innerHTML += `<div class="border border-emerald-100 p-4 rounded-xl bg-emerald-50/30">
                    <h3 class="font-black text-lg text-gray-800">${s.prenom} ${s.nom}</h3>
                    <button onclick="ouvrirModalDevoir('${studentId}', '${s.prenom} ${s.nom}')" class="mt-3 w-full bg-indigo-600 text-white py-2 rounded-lg font-bold text-sm">📖 إرسال واجب </button>
                </div>`;
            });
        }

        async function chargerSuiviDevoirs() {
            const session = Auth.getSession();
            const mesDevoirs = await Auth.getDevoirs('prof', session.username);
            const container = document.getElementById('liste-suivi-devoirs');
            
            if (mesDevoirs.length === 0) { container.innerHTML = `<p class="text-gray-500 italic">لا يوجد أي واجب مسجل </p>`; return; }

            container.innerHTML = mesDevoirs.map(devoir => `
                <div class="border border-gray-200 rounded-xl p-4 flex justify-between md:items-center bg-white mb-2">
                    <div><h3 class="font-bold text-lg text-gray-800">سورة ${devoir.surate} (الآية ${devoir.aya_debut} إلى ${devoir.aya_fin})</h3>
                    <p class="text-sm text-gray-600 mt-1">التلميذ : <span class="font-semibold text-blue-600">${devoir.student_id}</span></p></div>
                    <button onclick="confirmerAnnulationDevoir('${devoir.id}')" class="bg-red-100 text-red-600 px-4 py-2 rounded-lg text-sm font-bold">إلغاء الواجب </button>
                </div>`).join('');
        }

        async function envoyerDevoir() {
            const studentId = document.getElementById('devoir-student-id').value;
            const surate = document.getElementById('devoir-surate').value;
            const debut = document.getElementById('devoir-debut').value;
            const fin = document.getElementById('devoir-fin').value;
            const date = document.getElementById('devoir-date').value;
            
            const session = Auth.getSession();
            const res = await Auth.ajouterDevoir(studentId, session.prenom, surate, debut, fin, date);
            if(res.ok) { alert("تم إرسال الواجب بنجاح !"); fermerModalDevoir(); chargerSuiviDevoirs(); }
        }

        async function confirmerAnnulationDevoir(id) {
            if (confirm("هل انت متاكد.")) { await Auth.annulerDevoir(id); chargerSuiviDevoirs(); alert("تم سحب الواجب."); }
        }

        function ouvrirModalDevoir(studentId, studentName) {
            document.getElementById('devoir-student-id').value = studentId;
            document.getElementById('devoir-student-name').innerText = studentName;
            document.getElementById('modal-devoir').classList.remove('hidden');
        }

        function fermerModalDevoir() {
            document.getElementById('modal-devoir').classList.add('hidden');
        }

        function deconnexion() {
            Auth.logout();
            window.location.href = 'login.html';
        }
        
        window.onload = initProfDashboard;
    </script>
    <!-- Modale d'envoi de devoir (Cachée par défaut) -->
<div id="modal-devoir" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center p-4 z-50">
    <div class="bg-white rounded-2xl p-6 w-full max-w-md shadow-xl">
        <h2 class="text-xl font-black text-gray-800 mb-4">📖 إرسال واجب </h2>
        <p class="text-sm text-gray-500 mb-4">إلى التلميذ: <span id="devoir-student-name" class="font-bold text-emerald-600"></span></p>
        
        <input type="hidden" id="devoir-student-id">
        
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">السورة </label>
                <input type="text" id="devoir-surate"  class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-emerald-200 outline-none">
            </div>
            
            <div class="flex gap-4">
                <div class="flex-1">
                    <label class="block text-sm font-bold text-gray-700 mb-1">من الآية </label>
                    <input type="number" id="devoir-debut" min="1" class="w-full px-3 py-2 border rounded-lg outline-none">
                </div>
                <div class="flex-1">
                    <label class="block text-sm font-bold text-gray-700 mb-1">إلى الآية </label>
                    <input type="number" id="devoir-fin" min="1" class="w-full px-3 py-2 border rounded-lg outline-none">
                </div>
            </div>
            
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">آخر أجل </label>
                <input type="date" id="devoir-date" class="w-full px-3 py-2 border rounded-lg outline-none">
            </div>
        </div>

        <div class="flex gap-3 mt-6">
            <button onclick="fermerModalDevoir()" class="flex-1 bg-gray-100 text-gray-600 py-2 rounded-lg font-bold hover:bg-gray-200">إلغاء </button>
            <button onclick="envoyerDevoir()" class="flex-1 bg-emerald-600 text-white py-2 rounded-lg font-bold hover:bg-emerald-700">إرسال </button>
        </div>
    </div>
</div>
<!-- Section Suivi des Devoirs -->
<div class="bg-white rounded-2xl shadow-sm p-6 mt-8">
    <div class="flex justify-between items-center mb-6">
        <h2 class="text-xl font-bold text-gray-800">
            📋 متابعة الواجبات
        </h2>
        <button onclick="chargerSuiviDevoirs()" class="text-sm text-blue-600 hover:text-blue-800 transition">
            🔄 تحديث
        </button>
    </div>
    
    <!-- Liste générée dynamiquement -->
    <div id="liste-suivi-devoirs" class="space-y-4">
        <!-- Les devoirs apparaîtront ici -->
    </div>
</div>
</body>
</html>
